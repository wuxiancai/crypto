services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=30
    mem_limit: 512m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crypto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env, do not use a default}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_quant}
    ports:
      # Bind to loopback only so the database is never reachable from the LAN/Internet.
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - crypto_quant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crypto} -d ${POSTGRES_DB:-crypto_quant}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  crypto_quant_postgres_data:
